{% extends "base.html" %}

{% block content %}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}<time class="post-date" datetime="{{ page.dateISO }}">{{ page.date }}</time>{% endif %}
    {% if page.tags %}
    <ul class="post-tags">
      {% for tag in page.tags %}<li>{{ tag }}</li>{% endfor %}
    </ul>
    {% endif %}
    {% if page.extra.url %}
    <p class="post-source"><a href="{{ page.extra.url }}" rel="noopener" target="_blank">원본 보기 ↗</a></p>
    {% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="/">← Back</a>
  </footer>
</article>
{% endblock %}
