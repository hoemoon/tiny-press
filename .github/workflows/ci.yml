name: CI
on: [push, pull_request]

jobs:
  core:
    name: core (Swift Package)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick Xcode 26+ (or skip)
        id: xc
        run: |
          XC=$(ls -d /Applications/Xcode*.app | sort -r | head -1)
          XC_VER=$("$XC/Contents/Developer/usr/bin/xcodebuild" -version | head -1 | awk '{print $2}')
          XC_MAJOR=${XC_VER%%.*}
          if [ "${XC_MAJOR:-0}" -lt 26 ]; then
            echo "::warning::No Xcode 26+ on this runner (found $XC_VER). Skipping — build locally."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "DEVELOPER_DIR=$XC/Contents/Developer" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.xc.outputs.skip != 'true'
        working-directory: core
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        if: steps.xc.outputs.skip != 'true'
        working-directory: core
        run: swift test --enable-code-coverage
