name: CI
on: [push, pull_request]

jobs:
  core:
    name: core (Swift Package)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick Xcode 26+ (or skip)
        id: xc
        run: |
          XC=$(ls -d /Applications/Xcode*.app | sort -r | head -1)
          XC_VER=$("$XC/Contents/Developer/usr/bin/xcodebuild" -version | head -1 | awk '{print $2}')
          XC_MAJOR=${XC_VER%%.*}
          if [ "${XC_MAJOR:-0}" -lt 26 ]; then
            echo "::warning::No Xcode 26+ on this runner (found $XC_VER). Skipping — build locally."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "DEVELOPER_DIR=$XC/Contents/Developer" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.xc.outputs.skip != 'true'
        working-directory: core
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        if: steps.xc.outputs.skip != 'true'
        working-directory: core
        run: swift test --enable-code-coverage

      - name: Manual sync check
        if: steps.xc.outputs.skip != 'true'
        working-directory: core
        run: python3 scripts/generate-manual.py --check

  mac:
    name: mac (Tuist + Xcode)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick Xcode 26+ (or skip)
        id: xc
        run: |
          XC=$(ls -d /Applications/Xcode*.app | sort -r | head -1)
          XC_VER=$("$XC/Contents/Developer/usr/bin/xcodebuild" -version | head -1 | awk '{print $2}')
          XC_MAJOR=${XC_VER%%.*}
          if [ "${XC_MAJOR:-0}" -lt 26 ]; then
            echo "::warning::No Xcode 26+ on this runner (found $XC_VER). Skipping — build locally."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "DEVELOPER_DIR=$XC/Contents/Developer" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Tuist
        if: steps.xc.outputs.skip != 'true'
        run: brew install tuist xcbeautify

      - name: Generate
        if: steps.xc.outputs.skip != 'true'
        working-directory: mac
        run: |
          tuist install
          tuist generate --no-open

      - name: Build
        if: steps.xc.outputs.skip != 'true'
        working-directory: mac
        run: |
          xcodebuild -workspace TinyPress.xcworkspace \
            -scheme TinyPress \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify

      - name: Test
        if: steps.xc.outputs.skip != 'true'
        working-directory: mac
        run: |
          xcodebuild test -workspace TinyPress.xcworkspace \
            -scheme TinyPress \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
